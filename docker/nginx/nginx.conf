user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" $request_time';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Compresion -- respuestas JSON de la API son el caso principal.
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types application/json application/javascript text/css text/plain text/xml application/xml;

    # Headers de seguridad basicos. HSTS queda comentado -- no tiene sentido
    # sin HTTPS todavia (forzaria HTTPS en un sitio que solo sirve HTTP hoy).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 20m;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # -----------------------------------------------------------------
    # HTTPS (futuro, no activo todavia -- ver docs/DEPLOYMENT.md).
    # Cuando haya certificados (ej. Let's Encrypt), descomentar y ajustar:
    #
    # server {
    #     listen 443 ssl;
    #     server_name tu-dominio.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #
    #     location / {
    #         proxy_pass http://backend;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }
    #
    # server {
    #     listen 80;
    #     server_name tu-dominio.com;
    #     return 301 https://$host$request_uri;
    # }
    # -----------------------------------------------------------------
}
