services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-media_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?falta POSTGRES_PASSWORD en .env}
    command:
      # logging_collector: logs de Postgres a archivo (ver docs/DEPLOYMENT.md,
      # seccion Logging) ademas de stdout -- sin esto solo quedarian en
      # `docker compose logs`, no en el host.
      - "postgres"
      - "-c"
      - "logging_collector=on"
      - "-c"
      - "log_directory=/var/log/postgresql"
      - "-c"
      - "log_filename=postgresql.log"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./logs/postgres:/var/log/postgresql
    ports:
      # Solo para acceso administrativo (psql, backups manuales) -- el
      # backend habla con Postgres por la red interna de docker compose, no
      # por este puerto. Default 5433 (no 5432) porque el compose de
      # desarrollo local ya usaba ese puerto para no chocar con un Postgres
      # nativo en la maquina de dev -- en el servidor de produccion es
      # seguro usar 5432 si prefieres, cambialo en .env.
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-media_intelligence}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-media_intelligence}
      # Claude es el LLM primario -- obligatoria. OpenAI queda como respaldo
      # (ver AIProviderWithFallback), por eso no es obligatoria: si falta,
      # el fallback simplemente no tiene a donde caer si Claude falla.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?falta ANTHROPIC_API_KEY en .env}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-5}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LOCAL_MEDIA_DIR: /data/recordings
      # Ingesta S3 -> Postgres (docs/INGESTION_DESIGN.md). Los scripts de
      # scripts/discover_grabaciones.py, enqueue_transcriptions.py y
      # consume_transcription_results.py corren dentro de este contenedor
      # via `docker compose exec backend python scripts/...` -- boto3 toma
      # las credenciales del instance profile de EC2 (media-intel-backend),
      # no hace falta AWS_ACCESS_KEY_ID/SECRET aca.
      RECORDING_RESOLVER: ${RECORDING_RESOLVER:-local}
      CAPTURE_BUCKET: ${CAPTURE_BUCKET:-mediadev-recordings}
      TRANSCRIBE_OUTPUT_BUCKET: ${TRANSCRIBE_OUTPUT_BUCKET:-media-intel-transcribe-050871635829}
      CLIPS_BUCKET: ${CLIPS_BUCKET:-media-intel-clips-050871635829}
      TRANSCRIPTION_JOBS_QUEUE_URL: ${TRANSCRIPTION_JOBS_QUEUE_URL:-}
      TRANSCRIPTION_DONE_QUEUE_URL: ${TRANSCRIPTION_DONE_QUEUE_URL:-}
      TRANSCRIPTION_DLQ_URL: ${TRANSCRIPTION_DLQ_URL:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # Solo lectura contra la DB del sistema capturador (Destroyer), tabla
      # recording_coverage -- ver CoverageDiscoveryService.
      DATABASE_URL_COVERAGE: ${DATABASE_URL_COVERAGE:-}
    volumes:
      # Ver docs/DEPLOYMENT.md, seccion "Nota: audio/words vs LocalFileRecordingResolver"
      # -- LOCAL_MEDIA_DIR sigue siendo un directorio combinado por ahora.
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
