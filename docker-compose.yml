services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: media_intelligence
    ports:
      # 5433 en el host: el 5432 ya esta ocupado por un Postgres nativo de Windows en esta maquina.
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
